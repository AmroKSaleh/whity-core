name: whity_tokens
description: >
  Generated design tokens (colors, typography, spacing, radius) for Whity
  products, targeting Flutter / Material Design 3. Source of truth is
  src/design/tokens/base.json in the whity-core repo; do not hand-edit
  lib/src/generated/tokens.dart — it's regenerated by `npm run tokens:generate`.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
