services:
  postgres:
    image: postgres:15-alpine
    container_name: whity_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-whity}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-whity_dev}
      POSTGRES_DB: ${DB_NAME:-whity_core}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-whity}"]
      interval: 10s
      timeout: 5s
      retries: 5

  frankenphp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whity_frankenphp
    ports:
      - "8000:80"
    environment:
      DB_USER: ${DB_USER:-whity}
      DB_PASSWORD: ${DB_PASSWORD:-whity_dev}
      DB_NAME: ${DB_NAME:-whity_core}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      CADDY_GLOBAL_OPTIONS: "auto_https off"
      SERVER_NAME: ":80"
      SERVER_ROOT: "public/"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app

volumes:
  postgres_data:
