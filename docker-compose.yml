services:
  postgres:
    image: postgres:15-alpine
    container_name: whity_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-whity}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-whity_dev}
      POSTGRES_DB: ${DB_NAME:-whity_core}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-whity}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
