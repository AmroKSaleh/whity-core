services:
  postgres:
    image: postgres:15-alpine
    container_name: whity_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-whity}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-whity_dev}
      POSTGRES_DB: ${DB_NAME:-whity_core}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-whity} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frankenphp:
    build:
      context: .
      dockerfile: Dockerfile
      # Dev builds the runtime-only stage; the checkout is bind-mounted below.
      # The `release` stage (code baked in) is for the GHCR image only.
      target: base
    image: whity-core:dev
    container_name: whity_frankenphp
    ports:
      - "8000:80"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_USER: ${DB_USER:-whity}
      DB_PASSWORD: ${DB_PASSWORD:-whity_dev}
      DB_NAME: ${DB_NAME:-whity_core}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      # Connection pooling for persistent FrankenPHP workers (WC-21).
      # DB_CONNECT_TIMEOUT: seconds to wait when (re)opening a PostgreSQL socket.
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-5}
      # DB_MAX_LIFETIME: seconds before a worker recycles its connection. Kept
      # well below typical server idle timeouts so connections are refreshed
      # before the server can drop them. Default 30 minutes.
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-1800}
      # DB_PING_INTERVAL: minimum seconds between "SELECT 1" health checks before
      # a query. Throttles liveness checks so a hot worker is not pinged on every
      # request while still catching connections that died while the worker idled.
      DB_PING_INTERVAL: ${DB_PING_INTERVAL:-5}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      # ENCRYPTION_KEY: secret used to AES-256-CBC encrypt stored TOTP 2FA secrets (WC-95).
      # MUST be identical across setup/confirm and login so encrypt/decrypt use the same key.
      # The dev default below is for local use only; outside APP_ENV=development the app fails fast
      # if this is unset/empty (mirroring JWT_SECRET). Override in production with a strong secret.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_in_production}
      CADDY_GLOBAL_OPTIONS: "auto_https off"
      SERVER_NAME: ":80"
      SERVER_ROOT: "public/"
      FRANKENPHP_WORKERS: ${FRANKENPHP_WORKERS:-8}
      FRANKENPHP_TIMEOUT: ${FRANKENPHP_TIMEOUT:-60s}
      MAX_REQUESTS: ${MAX_REQUESTS:-500}
    volumes:
      - .:/app
      - ./Caddyfile:/etc/frankenphp/Caddyfile
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    working_dir: /app

  # Scheduled maintenance (WC-188). A dedicated long-running container that runs
  # the revoked_tokens:cleanup cron on a schedule, so the cleanup is GENUINELY
  # wired into the running stack — not merely documented. It reuses the same
  # whity-core:dev image and bind-mounts the checkout, waits for the one-shot
  # db-init to finish, then loops: prune expired revocations, then sleep ~24h.
  # A lightweight sleep loop (rather than a system crond) keeps the container
  # single-purpose and its log readable via `docker compose logs cron`. The job
  # is idempotent and safe to run any time — it only deletes already-expired
  # rows. Staging/production schedule the SAME command via their own scheduler
  # (see docs/wiki/Cron-Operations.md).
  cron:
    image: whity-core:dev
    container_name: whity_cron
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-whity_core}
      DB_USER: ${DB_USER:-whity}
      DB_PASSWORD: ${DB_PASSWORD:-whity_dev}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
    working_dir: /app
    # Opt-in auxiliary service: run with `docker compose --profile cron up`.
    # Kept out of the DEFAULT stack so `docker compose up --wait` (used by the
    # e2e job) does not try to gate readiness on a long-running maintenance
    # loop — `--wait` errors on such a service whether it has the base image's
    # (HTTP) healthcheck (reports "unhealthy") or none ("no healthcheck
    # configured"). Scheduling for staging/production is the orchestrator's job
    # (see docs/wiki/Cron-Operations.md); this service is a dev convenience.
    profiles:
      - cron
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        echo "[cron] revoked-tokens cleanup scheduler started (daily)";
        while true; do
          echo "[cron] $$(date -u +%FT%TZ) running revoked-tokens:cleanup";
          php public/index.php revoked-tokens:cleanup || echo "[cron] cleanup failed (will retry next cycle)";
          sleep 86400;
        done

  # Dev-only one-shot bootstrap (#174): on `docker compose up`, wait for Postgres then —
  # only when APP_ENV=development — run migrations + seed so a fresh/empty dev DB is
  # immediately usable (no manual `make setup`). Idempotent: migrations are IF NOT EXISTS
  # and seed is ON CONFLICT, so re-running `up` on a populated DB is a no-op (seed-if-empty,
  # never overwrite). Runs in its own container before the worker pool starts, so it never
  # races the 8 FrankenPHP workers. Staging/production do NOT use this file (see
  # docker-compose.staging.yml) and bootstrap via an explicit migrate+seed deploy step.
  db-init:
    image: whity-core:dev
    container_name: whity_db_init
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-whity_core}
      DB_USER: ${DB_USER:-whity}
      DB_PASSWORD: ${DB_PASSWORD:-whity_dev}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_encryption_key_change_in_production}
      # Deterministic dev credentials (development only; override via env if desired).
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
      INITIAL_USER_PASSWORD: ${INITIAL_USER_PASSWORD:-user123}
      INITIAL_SYSTEM_ADMIN_PASSWORD: ${INITIAL_SYSTEM_ADMIN_PASSWORD:-systemadmin123}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    restart: "no"
    command:
      - sh
      - -c
      - |
        if [ "$$APP_ENV" = "development" ]; then
          echo "[db-init] bootstrapping development database...";
          php public/index.php migrate run && php public/index.php seed;
        else
          echo "[db-init] skipped (APP_ENV=$$APP_ENV, not development)";
        fi

volumes:
  postgres_data:
