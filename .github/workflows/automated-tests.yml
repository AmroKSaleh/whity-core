name: Automated Tests

# Doc-only changes can't affect the build, tests, or generated artifacts, so
# skip the suite when every changed path is documentation. `paths-ignore` only
# suppresses a run when ALL changed files match — a PR that touches both code
# and docs still runs the full gate. (No required status checks are configured
# on `main`, so a skipped run never leaves a doc-only PR blocked on a pending
# check.)
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'

# A newer push to the same ref obsoletes the in-flight run; never let two full
# suites race (this is what burned a duplicate ~13-min run when a fix commit
# landed on a PR before the prior run finished). Mirrors e2e.yml.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which side of the codebase changed so single-sided PRs skip the jobs
  # they can't affect: a backend-only PR skips the ~2-min `web` job, and a
  # frontend-only PR skips the ~10-13-min real-Postgres job. The typed-client
  # drift gate lives in `web` and depends only on public/openapi.json (the
  # generated contract), so `web` runs whenever that file changes — a src/**
  # change that alters the API necessarily regenerates it (the `test` job's
  # OpenAPI drift check enforces that), so the drift gate is never skipped.
  # Workflow-file edits run everything. If detection can't run (e.g. a push with
  # no fetchable base), the filter fails open and the jobs run.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'plugins/**'
              - 'sdk/**'
              - 'database/**'
              - 'public/**'
              - 'scripts/**'
              - 'composer.json'
              - 'composer.lock'
              - 'phpstan.neon'
              - 'phpstan-baseline.neon'
              - 'phpunit.xml'
              - 'infection.json5'
              - '.github/workflows/automated-tests.yml'
            frontend:
              - 'web/**'
              - 'public/openapi.json'
              - '.github/workflows/automated-tests.yml'

  test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    name: Unit, static analysis & plugin smoke (SQLite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite
          coverage: pcov

      # Unified composer cache key (WC-232ec317): the vendor/ tree is identical
      # across the test / postgres / mutation / e2e jobs (they differ only in
      # loaded PHP extensions, which live outside vendor/), so one shared key
      # warms them all and cuts redundant cache entries under the 10 GB budget.
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Fail the build on a known security advisory in a locked dependency
      # (WC-232ec317). Cheap (~seconds) and turns a supply-chain regression into
      # a pre-merge gate rather than a production surprise.
      - name: Composer security audit
        run: composer audit --no-interaction --abandoned=report

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover coverage.xml --coverage-text

      # Enforce minimum line-coverage floor defined in scripts/coverage-check.php.
      # The floor value and instructions for updating it live in that file.
      - name: Enforce coverage floor
        run: php scripts/coverage-check.php coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      # The committed public/openapi.json must match a fresh generation from
      # the live PHP router — API changes that skip `generate:openapi` would
      # ship a published contract that lies to the typed client (#168) and the
      # schema-driven UI (#169). Mirrors the `web` job's schema.d.ts drift
      # check (WC-168); the PHPUnit OpenApiSpecDriftTest is the primary gate,
      # this byte-level diff is defense-in-depth (WC-179).
      - name: OpenAPI spec drift check
        run: |
          php public/index.php generate:openapi
          git diff --exit-code -- public/openapi.json

      # Restore PHPStan's result cache (tmpDir: .phpstan-cache in phpstan.neon)
      # so unchanged files skip re-analysis — turns a ~60s cold analyse into a
      # few seconds on a small diff. Keyed per-commit with a loose restore-key so
      # every run seeds from the most recent cache; PHPStan invalidates internally
      # on any file/config/version change, so a stale restore is always safe.
      - name: Cache PHPStan result cache
        uses: actions/cache@v4
        with:
          path: .phpstan-cache
          key: phpstan-${{ github.sha }}
          restore-keys: phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src tests plugins sdk --memory-limit=512M

      - name: Plugin-load smoke
        run: php scripts/ci-plugin-smoke.php

      # Tenant-isolation static guard (WC-192): fail CI if any SELECT/UPDATE/
      # DELETE touches a tenant-owned table without a tenant_id predicate and
      # without a reasoned `@tenant-guard-ignore:` annotation. Turns the #1
      # product risk (cross-tenant data exposure) into a CI-enforced invariant.
      - name: Tenant-predicate guard
        run: php scripts/ci-tenant-predicate-guard.php

      # Plugin tenant-isolation conformance kit (WC-194): run the SDK migration
      # linter + tenant-predicate scanner over the in-tree HelloWorld reference
      # plugin, the way an out-of-repo plugin runs it in its own CI. Fails if a
      # plugin tenant table lacks a tenant_id column or a handler runs an
      # unscoped query on a tenant-owned table.
      - name: Plugin tenant-isolation conformance (HelloWorld)
        run: php scripts/ci-plugin-tenant-conformance.php

  postgres-integration:
    name: Migrations + Integration + Security on real PostgreSQL
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    # A real PostgreSQL service so migrations/seed and the PHPUnit Integration
    # and Security suites run against the actual engine.  This catches
    # Postgres-specific bugs the SQLite test suite cannot — e.g. reserved-word
    # identifiers (WC-65: `symmetric`), rowCount() after SELECT, type coercion
    # differences — which only surface on a real PG engine.
    #
    # SchemaFromMigrations::make() detects PHPUNIT_PG_DSN and creates a fresh
    # per-test Postgres schema (namespace), runs the production migrations inside
    # it, and drops the schema at process exit, so the main whity_core database
    # is left intact after the suite.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: whity
          POSTGRES_PASSWORD: whity_dev
          POSTGRES_DB: whity_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whity -d whity_core"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, pgsql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # The app reads configuration from $_ENV (not getenv); the CLI bootstrap
      # loads a .env file into $_ENV, so write one rather than rely on the runner's
      # variables_order including 'E'.
      - name: Write .env for the CLI bootstrap
        run: |
          cat > .env <<'EOF'
          APP_ENV=development
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=whity_core
          DB_USER=whity
          DB_PASSWORD=whity_dev
          JWT_SECRET=ci_jwt_secret_min_32_chars_for_hs256_aaaa
          ENCRYPTION_KEY=ci_encryption_key_min_32_chars_bbbbbbbb
          INITIAL_ADMIN_PASSWORD=admin123
          INITIAL_USER_PASSWORD=user123
          INITIAL_SYSTEM_ADMIN_PASSWORD=systemadmin123
          INITIAL_SUPERUSER_PASSWORD=superuser123
          EOF

      - name: Run migrations on real PostgreSQL
        run: php public/index.php migrate run

      - name: Seed on real PostgreSQL
        run: php public/index.php seed

      - name: Re-run migrations (idempotency on PostgreSQL)
        run: php public/index.php migrate run

      # Run the Integration and Security PHPUnit suites against the live
      # PostgreSQL service.  SchemaFromMigrations::make() detects PHPUNIT_PG_DSN
      # and provisions a fresh, per-test-class Postgres schema for full isolation.
      # JWT_SECRET and ENCRYPTION_KEY must match the .env written above so that
      # any test that bootstraps the app via public/index.php sees the same values.
      - name: Run Integration suite on real PostgreSQL
        env:
          PHPUNIT_PG_DSN: "pgsql:host=localhost;port=5432;dbname=whity_core"
          PHPUNIT_PG_USER: whity
          PHPUNIT_PG_PASSWORD: whity_dev
          JWT_SECRET: ci_jwt_secret_min_32_chars_for_hs256_aaaa
          ENCRYPTION_KEY: ci_encryption_key_min_32_chars_bbbbbbbb
        run: vendor/bin/phpunit --testsuite Integration

      - name: Run Security suite on real PostgreSQL
        env:
          PHPUNIT_PG_DSN: "pgsql:host=localhost;port=5432;dbname=whity_core"
          PHPUNIT_PG_USER: whity
          PHPUNIT_PG_PASSWORD: whity_dev
          JWT_SECRET: ci_jwt_secret_min_32_chars_for_hs256_aaaa
          ENCRYPTION_KEY: ci_encryption_key_min_32_chars_bbbbbbbb
        run: vendor/bin/phpunit --testsuite Security

  # NOTE: Infection mutation testing moved OFF the per-PR path to a 6-hourly
  # scheduled run — see .github/workflows/mutation-testing.yml (WC-232ec317).
  # It took ~24 min (60s per-mutant timeout) and is a quality-TREND gate on main,
  # not a correctness gate; PRs still run SQLite + real-Postgres + PHPStan +
  # Playwright here. A mutation-coverage regression surfaces on the next
  # scheduled run after merge.

  web:
    name: Frontend types, tests & generated-artifact drift
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          # Single lockfile at the workspace root (npm workspaces).
          cache-dependency-path: package-lock.json

      # npm workspaces install the whole repo from the root lockfile; the web
      # scripts below still run with working-directory: web (bins resolve from
      # the hoisted root node_modules).
      - name: Install dependencies
        working-directory: .
        run: npm ci

      # Fail on a high/critical advisory in an installed npm dependency
      # (WC-232ec317). `--audit-level=high` keeps low/moderate noise out of the
      # gate while still blocking genuinely exploitable supply-chain regressions.
      - name: npm security audit
        working-directory: .
        run: npm audit --audit-level=high

      # The committed lib/api/schema.d.ts must match a fresh generation from
      # public/openapi.json — API changes that skip `npm run generate:api`
      # would ship a typed client that lies about the contract (WC-168).
      - name: Typed-client schema drift check
        run: |
          npm run generate:api
          git diff --exit-code -- lib/api/schema.d.ts

      # The committed design-token outputs must match the generator (base.json
      # is the single source of truth for styling variables).
      - name: Design-token drift check
        run: npm run tokens:check

      # The shadcn registry manifest must stay buildable; its output is
      # generated at build time (prebuild) and never committed.
      - name: Registry build smoke
        run: npm run registry:build

      - name: Type check
        run: npx tsc --noEmit

      # ESLint gate (WC-122): zero errors required; warnings are tolerated.
      # Runs after the WC-195 debt clearance so the gate starts clean.
      - name: Lint
        run: npm run lint

      # A full production build gates build-breaking RSC/route errors and a
      # broken prebuild shadcn-registry generation, so they fail CI instead of
      # surfacing at deploy (WC-180). `npm run build` runs the `prebuild`
      # registry hook then `next build`. On Next 16 `next build` no longer runs
      # ESLint (`next lint` was removed), so this validates ONLY the registry
      # generation plus build-breaking RSC/route/type errors.
      # Next.js reuses its compiler/output cache in .next/cache across builds;
      # restoring it makes `next build` incremental. Keyed on the lockfile plus
      # source hash so a dependency or source change seeds from the most recent
      # cache (restore-keys) rather than building fully cold.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ hashFiles('package-lock.json') }}-
            nextjs-

      - name: Build (production)
        run: npm run build

      - name: Run Jest
        run: npx jest

      # Gate both component galleries so a broken story can't land silently
      # (WC-3f9b0364). Both workspaces define build-storybook; run from the repo
      # root so the -w workspace flags resolve.
      - name: Build Storybook galleries
        working-directory: .
        run: |
          npm run build-storybook -w @amroksaleh/ui
          npm run build-storybook -w web
