name: E2E

# Doc-only changes can't affect the running stack or the E2E suite, so skip it
# when every changed path is documentation. `paths-ignore` only suppresses a run
# when ALL changed files match — a PR that touches both code and docs still runs.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'

# A newer push to the same ref obsoletes the in-flight run; never queue two.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright shard ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # The dev compose file bind-mounts this checkout into the containers and
      # its one-shot db-init service runs `php public/index.php migrate run`,
      # which needs vendor/autoload.php — and vendor/ is gitignored. Provision
      # PHP + Composer on the runner BEFORE compose up so the bind-mounted
      # checkout carries vendor/ into the containers (the suite's TOTP helper
      # also requires /app/vendor/autoload.php via docker exec).
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pgsql, pdo_pgsql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Pull postgres:15-alpine before compose up so Docker Hub flakiness
      # (rate-limit / transient auth timeout) can be retried independently.
      # Three attempts with a backoff are enough to ride out brief outages
      # without burning the 25-minute job timeout on a single hung pull.
      - name: Pull Docker base images (with retry)
        run: |
          for i in 1 2 3; do
            docker pull postgres:15-alpine && break
            echo "Pull attempt $i failed — retrying in 15s..."
            sleep 15
          done

      # The dev compose file builds whity-core:dev from the Dockerfile `base`
      # target and bind-mounts the checkout. With the APP_ENV=development
      # default, the one-shot db-init service runs migrations + seed before
      # the worker pool starts, so the stack comes up with the deterministic
      # accounts the suite expects (admin123 / user123 compose defaults).
      - name: Start the backend stack
        run: docker compose -f docker-compose.yml up -d --wait

      # `--wait` covers container/healthcheck state, not end-to-end readiness
      # of the HTTP surface; poll the health endpoint until the API answers.
      - name: Wait for the backend API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend healthy after ~$(( i * 2 ))s"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy within 120s" >&2
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --tail 100
          exit 1

      # setup-node v5 (issue #198 tracks aligning the other workflows' v4).
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          # Single lockfile at the workspace root (npm workspaces).
          cache-dependency-path: package-lock.json

      # npm workspaces install from the root lockfile; the Playwright steps below
      # still run with working-directory: web (bins resolve from the hoisted root
      # node_modules and the config is loaded from web/).
      - name: Install dependencies
        working-directory: .
        run: npm ci

      # Playwright browser binaries are versioned by the @playwright/test
      # release and live in ~/.cache/ms-playwright. Cache them keyed on that
      # version so all three shards reuse one download instead of fetching
      # Chromium independently on every run. The key changes only when
      # @playwright/test is bumped, so the cache refreshes exactly when the
      # browser actually changes (a calendar TTL would re-download daily for
      # nothing); GitHub also evicts caches untouched for 7 days, so a quiet
      # repo re-warms on its own.
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: web
        run: echo "version=$(node -e 'console.log(require("@playwright/test/package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # Cache miss: install the browser plus its OS-level dependencies. Cache
      # hit: the binaries are already restored, so only (re)install the system
      # deps — those are apt packages that live outside the cached directory.
      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      # The Playwright config starts the Next dev server itself (webServer on
      # port 3010) and proxies /api/* to the stack at localhost:8000.
      - name: Run the E2E suite (shard ${{ matrix.shard }}/3)
        working-directory: web
        run: npx playwright test --shard=${{ matrix.shard }}/3

      - name: Upload Playwright report and traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-${{ matrix.shard }}
          path: |
            web/playwright-report
            web/test-results
          retention-days: 7
          if-no-files-found: ignore
