# Release pipeline (WC-172): pushing a tag `vX.Y.Z` publishes a core release.
#
# Gates, in order:
#   1. verify / postgres-integration / web — full parity with the PR gate
#      (.github/workflows/automated-tests.yml): the tag name must equal
#      `v` + CoreVersion::VERSION (a release can never ship with a lying
#      version), the full backend suite + static analysis + plugin smoke must
#      pass, migrations + seed must run on real PostgreSQL, and the frontend
#      types/tests/generated-artifact drift checks must pass on the tagged
#      commit. A release is never gated weaker than a PR.
#   2. image — build the production container image (the Dockerfile `release`
#      stage: code + no-dev vendor baked in) and push it to GHCR as
#      ghcr.io/<repo>:vX.Y.Z and :latest.
#   3. release — create the GitHub Release with auto-generated notes (the
#      source archives GitHub attaches are the deploy artifact for
#      checkout-based hosts; the GHCR image serves container-based ones).
#
# Consumers check for updates with `php public/index.php update:check` and
# apply them via docs/wiki/Core-Update.md.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify tag + full suite
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-release-verify-${{ hashFiles('composer.lock') }}
          restore-keys: composer-release-verify-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Tag must match CoreVersion::VERSION
        run: |
          VERSION=$(php -r "require 'vendor/autoload.php'; echo \Whity\Core\CoreVersion::VERSION;")
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match CoreVersion::VERSION (${VERSION}). Bump src/Core/CoreVersion.php in a PR first, then tag the merge commit v${VERSION}."
            exit 1
          fi
          echo "Releasing version ${VERSION}"

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse src tests plugins sdk

      - name: Plugin-load smoke
        run: php scripts/ci-plugin-smoke.php

  postgres-integration:
    name: Migrations + seed on real PostgreSQL
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # A real PostgreSQL service so migrations/seed run against the actual engine.
    # This catches Postgres-specific bugs the SQLite test suite cannot — e.g. use
    # of a reserved keyword as an identifier (WC-65: `symmetric`), which only
    # fails on PostgreSQL.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: whity
          POSTGRES_PASSWORD: whity_dev
          POSTGRES_DB: whity_core
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whity -d whity_core"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, pgsql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-release-postgres-${{ hashFiles('composer.lock') }}
          restore-keys: composer-release-postgres-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # The app reads configuration from $_ENV (not getenv); the CLI bootstrap
      # loads a .env file into $_ENV, so write one rather than rely on the runner's
      # variables_order including 'E'.
      - name: Write .env for the CLI bootstrap
        run: |
          cat > .env <<'EOF'
          APP_ENV=development
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=whity_core
          DB_USER=whity
          DB_PASSWORD=whity_dev
          JWT_SECRET=ci_jwt_secret_min_32_chars_for_hs256_aaaa
          ENCRYPTION_KEY=ci_encryption_key_min_32_chars_bbbbbbbb
          INITIAL_ADMIN_PASSWORD=admin123
          INITIAL_USER_PASSWORD=user123
          INITIAL_SYSTEM_ADMIN_PASSWORD=systemadmin123
          INITIAL_SUPERUSER_PASSWORD=superuser123
          EOF

      - name: Run migrations on real PostgreSQL
        run: php public/index.php migrate run

      - name: Seed on real PostgreSQL
        run: php public/index.php seed

      - name: Re-run migrations (idempotency on PostgreSQL)
        run: php public/index.php migrate run

  web:
    name: Frontend types, tests & generated-artifact drift
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          # Single lockfile at the workspace root (npm workspaces).
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      # The committed lib/api/schema.d.ts must match a fresh generation from
      # public/openapi.json — API changes that skip `npm run generate:api`
      # would ship a typed client that lies about the contract (WC-168).
      - name: Typed-client schema drift check
        run: |
          npm run generate:api
          git diff --exit-code -- lib/api/schema.d.ts

      # The committed design-token outputs must match the generator (base.json
      # is the single source of truth for styling variables).
      - name: Design-token drift check
        run: npm run tokens:check

      # The shadcn registry manifest must stay buildable; its output is
      # generated at build time (prebuild) and never committed.
      - name: Registry build smoke
        run: npm run registry:build

      - name: Type check
        run: npx tsc --noEmit

      # ESLint gate (WC-122): zero errors required; warnings are tolerated.
      - name: Lint
        run: npm run lint

      # A full production build gates build-breaking RSC/route errors and a
      # broken prebuild shadcn-registry generation (WC-180); kept in parity with
      # the PR gate (automated-tests.yml) so a release is never gated weaker than
      # a PR. `npm run build` runs the `prebuild` registry hook then `next build`.
      # On Next 16 `next build` no longer runs ESLint — lint is its own gate.
      - name: Build (production)
        run: npm run build

      - name: Run Jest
        run: npx jest

  image:
    name: Build + push container image
    runs-on: ubuntu-latest
    needs: [verify, postgres-integration, web]

    permissions:
      contents: read
      packages: write
      security-events: write   # WC-d: upload the Trivy image-scan SARIF

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase repository path; github.repository may not be.
      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest

      # WC-d: scan the just-pushed release image for OS/library CVEs. REPORT-ONLY
      # for now (exit-code 0): a base-image HIGH/CRITICAL must not block the first
      # release. ignore-unfixed drops CVEs with no available fix (pure noise for a
      # gate). Findings land in the Security tab via the SARIF upload below; flip
      # exit-code to '1' to make it a hard release gate once the image is triaged.
      - name: Trivy image vulnerability scan (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  smoke:
    # WC-2990117b: Boot the GHCR image that was just pushed and confirm it serves
    # a real HTTP 200 from GET /api/health before the GitHub Release is created.
    # This closes the gap where a broken image (bad migration, missing extension,
    # wrong Caddyfile, boot crash) would become a published Release and be picked
    # up by every sovereign deployment running `update:check`.
    #
    # Networking approach: GitHub Actions `services:` containers live on a
    # separate Docker-managed bridge that job-level `docker run` containers
    # CANNOT reach by container name — only the runner host can. To mirror a
    # real docker-compose deploy (app → postgres by DNS name) we create a
    # user-defined bridge network and run BOTH the Postgres container AND the
    # release image on it, so the app reaches Postgres as `postgres:5432`.
    name: Smoke-test the release image
    runs-on: ubuntu-latest
    needs: [image]

    permissions:
      contents: read
      packages: read

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the image name the same way the `image` job does: lowercase the
      # repository path because GHCR requires it and github.repository may not be.
      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # Isolated bridge so the app reaches Postgres by the container name
      # `postgres` — same topology as docker-compose.yml (DB_HOST: postgres).
      - name: Create docker network
        run: docker network create whity-smoke

      # Run Postgres on the shared bridge. We do NOT use `services:` here
      # because services containers cannot be placed on a user-defined network
      # (they always join the default bridge that `docker run` containers
      # cannot resolve by name). Plain `docker run` + `pg_isready` polling
      # gives us the same health gate without the topology limitation.
      - name: Start Postgres
        run: |
          docker run -d \
            --name postgres \
            --network whity-smoke \
            -e POSTGRES_USER=whity \
            -e POSTGRES_PASSWORD=whity_smoke \
            -e POSTGRES_DB=whity_core \
            postgres:15-alpine

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec postgres pg_isready -U whity -d whity_core && break
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          docker exec postgres pg_isready -U whity -d whity_core

      - name: Pull release image
        run: docker pull "${{ steps.image.outputs.name }}:${{ github.ref_name }}"

      # Run migrations and seed inside the release image on the same network so
      # the app can reach Postgres by the container name `postgres`. APP_ENV is
      # set to `development` so the seed command actually inserts the initial
      # accounts (the seed command is a no-op outside development). JWT_SECRET
      # and ENCRYPTION_KEY must be >= 32 chars to pass the JwtSecretGuard /
      # TotpService fast-fail checks that fire even for CLI invocations.
      - name: Run migrations
        run: |
          docker run --rm \
            --network whity-smoke \
            -e APP_ENV=development \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=whity_core \
            -e DB_USER=whity \
            -e DB_PASSWORD=whity_smoke \
            -e JWT_SECRET=ci_smoke_jwt_secret_min_32_chars_aaaa \
            -e ENCRYPTION_KEY=ci_smoke_encryption_key_min_32_chars_bb \
            -e INITIAL_ADMIN_PASSWORD=smoke_admin_password_123 \
            -e INITIAL_USER_PASSWORD=smoke_user_password_1234 \
            -e INITIAL_SYSTEM_ADMIN_PASSWORD=smoke_sysadmin_password_12 \
            -e INITIAL_SUPERUSER_PASSWORD=smoke_superuser_password_12 \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            php public/index.php migrate run

      - name: Run seed
        run: |
          docker run --rm \
            --network whity-smoke \
            -e APP_ENV=development \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=whity_core \
            -e DB_USER=whity \
            -e DB_PASSWORD=whity_smoke \
            -e JWT_SECRET=ci_smoke_jwt_secret_min_32_chars_aaaa \
            -e ENCRYPTION_KEY=ci_smoke_encryption_key_min_32_chars_bb \
            -e INITIAL_ADMIN_PASSWORD=smoke_admin_password_123 \
            -e INITIAL_USER_PASSWORD=smoke_user_password_1234 \
            -e INITIAL_SYSTEM_ADMIN_PASSWORD=smoke_sysadmin_password_12 \
            -e INITIAL_SUPERUSER_PASSWORD=smoke_superuser_password_12 \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}" \
            php public/index.php seed

      # Start the app detached. Caddy needs auto_https off and an explicit
      # SERVER_NAME so it binds to :80 rather than trying ACME. These are the
      # same vars docker-compose.yml passes to the frankenphp service.
      #
      # FRANKENPHP_CONFIG: the GHCR release image uses the base FrankenPHP
      # image's /etc/frankenphp/Caddyfile (not the project's Caddyfile, which
      # is bind-mounted in docker-compose but not in a plain `docker run`). The
      # base Caddyfile injects {$FRANKENPHP_CONFIG} into the frankenphp block,
      # so setting this env var enables persistent worker mode — matching the
      # production topology — without needing to mount the project Caddyfile.
      - name: Start app container
        run: |
          docker run -d \
            --name whity-app \
            --network whity-smoke \
            -p 8000:80 \
            -e APP_ENV=production \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=whity_core \
            -e DB_USER=whity \
            -e DB_PASSWORD=whity_smoke \
            -e JWT_SECRET=ci_smoke_jwt_secret_min_32_chars_aaaa \
            -e ENCRYPTION_KEY=ci_smoke_encryption_key_min_32_chars_bb \
            -e CADDY_GLOBAL_OPTIONS="auto_https off" \
            -e SERVER_NAME=":80" \
            -e SERVER_ROOT="public/" \
            -e FRANKENPHP_CONFIG="worker /app/public/index.php 4" \
            "${{ steps.image.outputs.name }}:${{ github.ref_name }}"

      # Poll GET /api/health until HTTP 200. A fresh FrankenPHP worker pool
      # (8 workers by default) takes a couple of seconds to boot, so we allow
      # up to 60 seconds (30 × 2 s). On timeout we dump the container logs and
      # the process list so the failure is diagnosable from the Actions run.
      - name: Wait for health 200
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || true)
            echo "Attempt $i/30 — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              curl -s http://localhost:8000/api/health
              exit 0
            fi
            sleep 2
          done
          echo "::error::Health check did not return 200 within 60 seconds."
          docker logs whity-app
          docker ps -a
          exit 1

      # Always clean up the containers and network, even on failure, so the
      # runner is left in a clean state for any subsequent jobs.
      - name: Tear down
        if: always()
        run: |
          docker rm -f whity-app postgres 2>/dev/null || true
          docker network rm whity-smoke 2>/dev/null || true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # smoke is now a gate: a release image that does not boot and serve /api/health
    # can never become a published GitHub Release (and thus never be picked up by
    # sovereign deployments running `update:check`).
    needs: [verify, postgres-integration, web, image, smoke]

    permissions:
      contents: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
