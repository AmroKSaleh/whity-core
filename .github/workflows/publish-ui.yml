name: Publish @amroksaleh/ui

on:
  push:
    branches: [main]
    paths:
      - "packages/ui/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@amroksaleh"

      - name: Install dependencies
        working-directory: packages/ui
        run: npm install

      # Guarantees every component stays usable from a plain Vite/Tauri SPA,
      # not just Next.js — fails the build if a Next-only import ever sneaks
      # in, rather than relying on a one-time audit staying true forever.
      - name: Guard against Next.js-only imports
        working-directory: packages/ui
        run: |
          if grep -rEn "from ['\"]next/" src --include="*.tsx" --include="*.ts"; then
            echo "::error::A packages/ui component imports a Next.js-only module (next/*). This package must stay usable from a plain Vite/Tauri SPA — remove the Next-specific dependency (inject as a prop/adapter instead)."
            exit 1
          fi
          echo "No Next.js-only imports found."

      # Idempotent publish: this workflow runs on any push touching packages/ui,
      # but a change without a version bump must NOT fail (npm returns 409
      # "cannot publish over existing version"). Publish only when the current
      # version isn't already in the registry; otherwise skip with a notice.
      - name: Publish if the version is new
        working-directory: packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already published — skipping. Bump the version in packages/ui/package.json to publish a new release."
          else
            echo "Publishing $NAME@$VERSION"
            npm publish
          fi
