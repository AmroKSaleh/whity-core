# CodeQL configuration for the JavaScript/TypeScript scan.
#
# Excludes third-party / generated assets we do not author and must not edit.
# `web/public/mockServiceWorker.js` is generated by Mock Service Worker
# (`npx msw init`) and carries a "Please do NOT modify this file" header. Its
# `message` handler uses MSW's own clientId-matching design rather than an
# `event.origin` check, which CodeQL reports as "missing origin verification" —
# a false positive for a dev/test request-mocking worker we cannot safely change.
name: "whity-codeql"

paths-ignore:
  - web/public/mockServiceWorker.js
